<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kumquat Café Paris</title>
  <meta name="description" content="Kumquat Café — Cuisine & Boissons au fil des saisons. 71 rue Saint-Maur, Paris 11." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500;1,600;1,700&family=Inter:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">

  <header class="home-header">
    <a href="index.html" class="home-logo home-logo--text">
      <span class="brand-wordmark">Kumquat</span>
      <span class="brand-tagline">Café Paris 11</span>
    </a>
  </header>

  <main class="home-stage">
    <section class="burger-grid burger-grid--home">

      <div class="burger grow" style="--delay:0s">
        <a href="menu.html" aria-label="La Carte">
          <img src="assets/menu/DSC_0518-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-0" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-0" startOffset="50%" text-anchor="middle">La Carte</textPath></text>
          </svg>
        </a>
      </div>

      <div class="burger grow" style="--delay:0.8s">
        <a href="galerie.html" aria-label="Galerie">
          <img src="assets/menu/DSC_0520-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-1" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-1" startOffset="50%" text-anchor="middle">Galerie</textPath></text>
          </svg>
        </a>
      </div>

      <div class="burger grow" style="--delay:1.6s">
        <a href="https://instagram.com/kumquat.cafe" target="_blank" rel="noopener" aria-label="Instagram">
          <img src="assets/menu/DSC_0526-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-2" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-2" startOffset="50%" text-anchor="middle">Instagram</textPath></text>
          </svg>
        </a>
      </div>

      <div class="burger grow" style="--delay:2.4s">
        <a href="reservation.html" aria-label="Réservation">
          <img src="assets/menu/DSC_0582-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-3" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-3" startOffset="50%" text-anchor="middle">Réserver</textPath></text>
          </svg>
        </a>
      </div>

      <div class="burger grow" style="--delay:3.2s">
        <a href="talks.html" aria-label="Nos Saisons">
          <img src="assets/menu/DSC_0610-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-4" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-4" startOffset="50%" text-anchor="middle">Nos Saisons</textPath></text>
          </svg>
        </a>
      </div>

      <div class="burger grow" style="--delay:4s">
        <a href="mailto:contact@kumquatcafe.fr" aria-label="Catering">
          <img src="assets/menu/DSC_0664-Photoroom.png" alt="" />
          <svg class="burger-curve" viewBox="0 0 320 60" aria-hidden="true">
            <defs><path id="curve-5" d="M 20 10 Q 160 58 300 10" fill="none" /></defs>
            <text><textPath href="#curve-5" startOffset="50%" text-anchor="middle">Catering</textPath></text>
          </svg>
        </a>
      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">

      <div class="site-footer-col">
        <p class="site-footer-tag">Événements & catering</p>
        <a href="mailto:contact@kumquatcafe.fr" class="site-footer-link site-footer-link--arrow">
          <span class="arrow">→</span> contact@kumquatcafe.fr
        </a>
        <div class="site-footer-socials">
          <a href="https://instagram.com/kumquat.cafe" target="_blank" rel="noopener">@kumquat.cafe</a>
        </div>
      </div>

      <div class="site-footer-col site-footer-col--center">
        <div class="footer-wordmark">
          <span class="brand-wordmark">Kumquat</span>
          <span class="brand-tagline">Café Paris 11</span>
        </div>
        <p class="site-footer-place">
          71 rue Saint-Maur<br/>
          75011 Paris
        </p>
        <p class="site-footer-hours">
          Mer – Ven · 8h30–17h30<br/>
          Sam · 9h–18h · Dim · 10h–16h
        </p>
      </div>

      <div class="site-footer-col site-footer-col--right">
        <p class="site-footer-motto">AU FIL<br/>DES<br/>SAISONS</p>
      </div>

    </div>
  </footer>

</body>
</html>
